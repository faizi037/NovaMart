name: novamart
description: A production-style Flutter e-commerce application demonstrating modern Flutter development practices.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.15.1
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_storage: ^12.4.9

  # REST API
  http: ^1.4.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Icons
  flutter_svg: ^2.2.0

  # Utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/